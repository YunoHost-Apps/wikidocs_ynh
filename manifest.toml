#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "wikidocs"
name = "WikiDocs"
description.en = "Databaseless markdown flat-file wiki engine"
description.fr = "Moteur wiki à fichiers plats sans base de données"

version = "1.0.85~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
website = "https://www.wikidocs.app/"
demo = "http://demo.wikidocs.app"
code = "https://github.com/Zavy86/WikiDocs"
fund = "https://www.paypal.com/paypalme/zavy86"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "130M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = [ "en", "de", "es", "fa", "fr", "it", "nl", "pt", "ru", "zh-hans", "zh-hant" ]
    default = "fr"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/Zavy86/WikiDocs/archive/refs/tags/1.0.85.tar.gz"
    sha256 = "754ce428f74dbbf19e5970d4544e55e1c375ea203345ce49c9f7c72dad5e154d"

    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.3-fpm, php8.3-dom, php8.3-mbstring, php8.3-xml"
